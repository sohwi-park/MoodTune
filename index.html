<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MoodTune: 감정 상태를 진단해 맞춤형 음악과 위로를 전하는 고3 수행평가용 웹사이트"
    />
    <title>MoodTune</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-orb orb-one"></div>
    <div class="background-orb orb-two"></div>

    <div class="container">
      <header class="glass-card hero-card">
        <p class="eyebrow">고3 수행평가용 감정 진단 웹사이트</p>
        <h1>MoodTune 🎧</h1>
        <p>지금 당신의 감정에 맞는 음악과 위로를 찾아드립니다.</p>
      </header>

      <main id="app">
        <section id="start-screen" class="card glass-card">
          <h2>MoodTune 시작하기</h2>
          <p>간단한 질문에 답하고 오늘의 마음 상태를 확인해보세요.</p>
          <button onclick="startQuiz()">시작하기</button>
        </section>

        <section id="quiz-screen" class="card glass-card hidden">
          <div class="progress-area">
            <div class="progress-label">
              <span id="progress-text">질문 1 / 5</span>
              <span id="progress-percent">20%</span>
            </div>
            <div class="progress-bar">
              <div id="progress-bar"></div>
            </div>
          </div>

          <h2 id="question-text"></h2>
          <div id="options"></div>
        </section>

        <section id="result-screen" class="card glass-card hidden" aria-live="polite">
          <h2>당신의 Mood 결과</h2>
          <div id="result-box"></div>
          <button onclick="restart()">다시하기</button>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
